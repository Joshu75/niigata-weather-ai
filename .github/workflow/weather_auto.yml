name: Daily Weather Forecast Automation

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # バージョンをv4に上げて黄色い警告を消します
    - name: Checkout Repository
      uses: actions/checkout@v4

    # バージョンをv5に上げて黄色い警告を消します
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # ★ここをよしおさんの実際のファイル名に修正しました！
    - name: Run LightGBM Forecast Script
      run: python niigata_ai_lgbm.py

    - name: Upload Forecast Image
      uses: actions/upload-artifact@v4
      with:
        name: weather-forecast-graph
        path: niigata_forecast.png