name: Daily Weather Forecast Automation

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run LightGBM Forecast Script
      run: python niigata_ai_lgbm.py

    # ▼▼ この部分があるか確認（なければ✏️で追記してください） ▼▼
    - name: Upload Forecast Image
      uses: actions/upload-artifact@v4
      with:
        name: weather-forecast-graph
        path: niigata_forecast.png
