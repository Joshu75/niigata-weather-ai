name: Daily Weather Forecast Automation

on:
  schedule:
    - cron: '15 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run LightGBM Forecast Script
      run: python niigata_ai_lgbm.py

    - name: Commit and Push Image
      run: |
        git config --global user.name 'GitHub Actions AI'
        git config --global user.email 'actions@github.com'
        git add niigata_forecast.png
        git commit -m "🤖 自動更新: 最新の予報グラフを生成" || exit 0
        git push